services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindfolio
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in V2/.env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/schema/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d mindfolio"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/mindfolio
      MINDFOLIO_ENV: production
      MINDFOLIO_CORS_ORIGINS: ${MINDFOLIO_CORS_ORIGINS:-http://localhost}
      MINDFOLIO_MARKET_DATA_PATH: /app/data/market-catalog.json
      MINDFOLIO_INVITE_IDENTITIES: ${MINDFOLIO_INVITE_IDENTITIES:?Set MINDFOLIO_INVITE_IDENTITIES in V2/.env}
      MINDFOLIO_REPORT_TTL_HOURS: ${MINDFOLIO_REPORT_TTL_HOURS:-72}
      MINDFOLIO_SESSION_SECRET: ${MINDFOLIO_SESSION_SECRET:?Set MINDFOLIO_SESSION_SECRET in V2/.env}
      MINDFOLIO_SESSION_TTL_HOURS: ${MINDFOLIO_SESSION_TTL_HOURS:-24}
      MINDFOLIO_BEDROCK_ENABLED: ${MINDFOLIO_BEDROCK_ENABLED:-false}
      MINDFOLIO_BEDROCK_MODEL_ID: ${MINDFOLIO_BEDROCK_MODEL_ID:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Local/demo only. Omit in EC2 production and use the instance IAM Role.
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/health', timeout=3)"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      # Optional for direct Swagger/API access. Remove this mapping if nginx
      # should be the only public entry point on the EC2 instance.
      - "${API_PORT:-8000}:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  pgdata:
