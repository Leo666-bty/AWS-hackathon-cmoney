[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "mindfolio-core"
version = "0.1.0"
description = "Shared deterministic domain logic and model contracts for Mindfolio V2"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.10,<3",
]

[tool.setuptools.packages.find]
where = ["src"]
